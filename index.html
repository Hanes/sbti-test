<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI - 靈魂人格測試</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 680px; margin: 0 auto; padding: 20px; }
    #intro-screen { text-align: center; padding: 60px 20px; }
    .title { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    .subtitle { color: #888; font-size: 1.1rem; margin-bottom: 40px; line-height: 1.8; }
    .start-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 16px 48px; font-size: 1.1rem; border-radius: 50px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .start-btn:hover { transform: scale(1.05); box-shadow: 0 8px 30px rgba(102,126,234,0.4); }
    #test-screen { display: none; }
    .progress-bar { background: #1a1a2e; border-radius: 10px; height: 8px; margin-bottom: 30px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; transition: width 0.4s ease; border-radius: 10px; }
    .progress-text { color: #888; font-size: 0.9rem; margin-bottom: 24px; text-align: center; }
    .question-card { background: #11111a; border-radius: 16px; padding: 28px; margin-bottom: 20px; border: 1px solid #222; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .question-text { font-size: 1.05rem; line-height: 1.7; margin-bottom: 20px; color: #f0f0f0; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option { background: #1a1a2e; border: 2px solid #2a2a3e; border-radius: 12px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; text-align: left; font-size: 0.95rem; color: #c0c0c0; }
    .option:hover { border-color: #667eea; background: #1e1e32; color: #fff; }
    .option.selected { border-color: #667eea; background: #252548; color: #fff; box-shadow: 0 0 20px rgba(102,126,234,0.15); }
    .nav-buttons { display: flex; gap: 12px; margin-top: 24px; justify-content: center; }
    .nav-btn { padding: 12px 32px; border-radius: 50px; border: none; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
    .prev-btn { background: #1a1a2e; color: #888; border: 1px solid #333; }
    .prev-btn:hover { background: #252538; }
    .prev-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .next-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .next-btn:hover { opacity: 0.9; transform: scale(1.02); }
    .next-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #result-screen { display: none; padding: 40px 20px; animation: fadeIn 0.5s ease; }
    .result-badge { text-align: center; font-size: 0.85rem; color: #667eea; background: rgba(102,126,234,0.1); padding: 6px 16px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }
    .result-type { text-align: center; font-size: 3rem; font-weight: 900; margin-bottom: 8px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .result-name { text-align: center; font-size: 1.4rem; color: #888; margin-bottom: 8px; }
    .result-intro { text-align: center; color: #aaa; font-size: 1.05rem; margin-bottom: 24px; font-style: italic; }
    .result-desc { background: #11111a; border-radius: 16px; padding: 24px; line-height: 1.9; color: #ccc; border: 1px solid #222; margin-bottom: 32px; }
    .result-match { text-align: center; background: #1a1a2e; border-radius: 12px; padding: 12px; margin-bottom: 24px; color: #888; font-size: 0.9rem; }
    .result-match strong { color: #667eea; }
    .dim-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin: 24px 0 16px; padding-bottom: 8px; border-bottom: 1px solid #2a2a3e; }
    .dim-grid { display: grid; gap: 10px; }
    .dim-card { background: #11111a; border-radius: 12px; padding: 14px 16px; border: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
    .dim-name { font-size: 0.85rem; color: #667eea; font-weight: 600; }
    .dim-desc { font-size: 0.85rem; color: #aaa; line-height: 1.5; flex: 1; margin-right: 12px; }
    .dim-level { font-size: 0.75rem; padding: 2px 10px; border-radius: 10px; font-weight: 700; white-space: nowrap; }
    .dim-level.H { background: rgba(102,200,120,0.15); color: #66c878; }
    .dim-level.M { background: rgba(234,200,102,0.15); color: #eac866; }
    .dim-level.L { background: rgba(200,100,102,0.15); color: #c8666a; }
    .restart-btn { display: block; width: 100%; padding: 16px; background: #1a1a2e; border: 1px solid #333; color: #888; border-radius: 12px; font-size: 1rem; cursor: pointer; margin-top: 32px; transition: all 0.2s; }
    .restart-btn:hover { background: #252538; color: #fff; }
    .disclaimer { text-align: center; color: #555; font-size: 0.8rem; margin-top: 40px; padding: 16px; line-height: 1.6; }
  </style>
</head>
<body>
<div class="container">
  <div id="intro-screen">
    <h1 class="title">🧬 SBTI 靈魂人格測試</h1>
    <p class="subtitle">MBTI 已過時，SBTI 來了。<br>31 道題目 · 15 維度分析 · 25 種人格<br>測測你的靈魂深處是什麼<br><small style="color:#555">本測試僅供娛樂</small></p>
    <button class="start-btn" onclick="startTest()">開始測試 →</button>
  </div>
  <div id="test-screen">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-text" id="progress-text"></div>
    <div id="question-area"></div>
    <div class="nav-buttons">
      <button class="nav-btn prev-btn" id="prev-btn" onclick="prevQuestion()" disabled>← 上一題</button>
      <button class="nav-btn next-btn" id="next-btn" onclick="nextQuestion()">下一題 →</button>
    </div>
  </div>
  <div id="result-screen">
    <div style="text-align:center">
      <div class="result-badge" id="result-badge"></div>
      <h1 class="result-type" id="result-type"></h1>
      <p class="result-name" id="result-name"></p>
      <p class="result-intro" id="result-intro"></p>
    </div>
    <div class="result-match" id="result-match"></div>
    <div class="result-desc" id="result-desc"></div>
    <h3 class="dim-title">📊 十五維度評分</h3>
    <div class="dim-grid" id="dim-grid"></div>
    <button class="restart-btn" onclick="restartTest()">重新測試</button>
    <p class="disclaimer">⚠️ 本測試僅供娛樂，請勿用於診斷、面相、占卜或人生裁決。<br>SBTI 靈魂人格測試</p>
  </div>
</div>
<script>
const QUESTIONS=[{id:"q1",dim:"S1",text:"我是一只阴暗的老鼠，一只爬行的蟑螂，这辈子没谈过一场恋爱，胆怯又自卑，我的青春就是一场又一场的幻想...",options:[{label:"我哭了。。",value:1},{label:"这是什么。。",value:2},{label:"这不是我！",value:3}]},{id:"q2",dim:"S1",text:"我不够好，周围的人都比我优秀",options:[{label:"确实",value:1},{label:"有时",value:2},{label:"不是",value:3}]},{id:"q3",dim:"S2",text:"我很清楚真正的自己是什么样的",options:[{label:"不认同",value:1},{label:"中立",value:2},{label:"认同",value:3}]},{id:"q4",dim:"S2",text:"我内心有真正追求的东西",options:[{label:"不认同",value:1},{label:"中立",value:2},{label:"认同",value:3}]},{id:"q5",dim:"S3",text:"我一定要不断往上爬、变得更厉害",options:[{label:"不认同",value:1},{label:"中立",value:2},{label:"认同",value:3}]},{id:"q6",dim:"S3",text:"外人的评价对我来说无所谓",options:[{label:"不认同",value:1},{label:"中立",value:2},{label:"认同",value:3}]},{id:"q7",dim:"E1",text:"对象超过5小时没回消息，说自己窜稀了，你会怎么想？",options:[{label:"拉稀不可能5小时，也许ta隐瞒了我。",value:1},{label:"在信任和怀疑之间摇摆。",value:2},{label:"也许今天ta真的不太舒服。",value:3}]},{id:"q8",dim:"E1",text:"我在感情里经常担心被对方抛弃",options:[{label:"是的",value:1},{label:"偶尔",value:2},{label:"不是",value:3}]},{id:"q9",dim:"E2",text:"我对天发誓，我对待每一份感情都是认真的！",options:[{label:"并没有",value:1},{label:"也许？",value:2},{label:"是的！（问心无愧骄傲脸）",value:3}]},{id:"q10",dim:"E2",text:"你的恋爱对象是一个完美的人，此时你会？",options:[{label:"就算ta再优秀我也不会陷入太深。",value:1},{label:"会介于A和C之间。",value:2},{label:"会非常珍惜ta，也许会变成恋爱脑。",value:3}]},{id:"q11",dim:"E3",text:"恋爱后，对象非常黏人，你作何感想？",options:[{label:"那很爽了",value:1},{label:"都行无所谓",value:2},{label:"我更喜欢保留独立空间",value:3}]},{id:"q12",dim:"E3",text:"我在任何关系里都很重视个人空间",options:[{label:"我更喜欢依赖与被依赖",value:1},{label:"看情况",value:2},{label:"是的！（斩钉截铁地说道）",value:3}]},{id:"q13",dim:"A1",text:"你走在街上，一位萌萌的小女孩递给你一根棒棒糖，此时你作何感想？",options:[{label:"其实邪恶的人心比世界上的痔疮更多。",value:1},{label:"也许吧。",value:2},{label:"是的，我愿相信好人更多。",value:3}]},{id:"q14",dim:"A1",text:"快考试了，但你约了喜欢的人一起玩游戏，你怎么办？",options:[{label:"翘了！反正就一次！",value:1},{label:"干脆请个假吧。",value:2},{label:"都快考试了还去啥。",value:3}]},{id:"q15",dim:"A2",text:"我喜欢打破常规，不喜欢被束缚",options:[{label:"认同",value:1},{label:"保持中立",value:2},{label:"不认同",value:3}]},{id:"q16",dim:"A2",text:"突然某一天，我发现人生哪有什么真正的意义，人不过是和动物一样被各种欲望支配...",options:[{label:"是这样的。",value:1},{label:"也许是，也许不是。",value:2},{label:"这简直是胡扯",value:3}]},{id:"q17",dim:"A3",text:"我做事主要为了取得成果和进步，而不是避免麻烦和风险",options:[{label:"不认同",value:1},{label:"中立",value:2},{label:"认同",value:3}]},{id:"q18",dim:"A3",text:"你因便秘坐在马桶上（已长达30分钟），拉不出很难受。此时你更像",options:[{label:"再坐三十分钟看看。",value:1},{label:"用力拍打自己的屁股并说：死屁股，快拉啊！",value:2},{label:"使用开塞露，快点拉出来才好。",value:3}]},{id:"q19",dim:"Ac1",text:"我做决定比较果断，不喜欢犹豫",options:[{label:"不认同",value:1},{label:"中立",value:2},{label:"认同",value:3}]},{id:"q20",dim:"Ac1",text:"此题没有题目，请盲选",options:[{label:"反复思考后感觉应该选A？",value:1},{label:"啊，要不选B？",value:2},{label:"不会就选C？",value:3}]},{id:"q21",dim:"Ac2",text:"别人说你"执行力强"，你内心更接近哪句？",options:[{label:"我被逼到最后确实执行力超强。。。",value:1},{label:"啊，有时候吧。",value:2},{label:"是的，事情本来就该被推进",value:3}]},{id:"q22",dim:"Ac2",text:"我做事常常有计划，____",options:[{label:"然而计划不如变化快。",value:1},{label:"有时能完成，有时不能。",value:2},{label:"我讨厌被打破计划。",value:3}]},{id:"q23",dim:"Ac3",text:"你因玩游戏结识许多网友，并被邀请线下见面，你的想法是？",options:[{label:"网上口嗨下就算了，真见面还是有点忐忑。",value:1},{label:"见网友也挺好，反正谁来聊我就聊两句。",value:2},{label:"我会热情聊天，万一呢？",value:3}]},{id:"q24",dim:"Ac3",text:"朋友带了ta的朋友一起来玩，你最可能的状态是",options:[{label:"对朋友的朋友天然有距离感",value:1},{label:"看对方，能玩就玩。",value:2},{label:"朋友的朋友也是朋友！要热情聊天",value:3}]},{id:"q25",dim:"So1",text:"我和人相处主打一个电子围栏，靠太近会自动报警",options:[{label:"认同",value:1},{label:"中立",value:2},{label:"不认同",value:3}]},{id:"q26",dim:"So1",text:"我渴望和我信任的人关系密切，熟得像失散多年的亲戚",options:[{label:"认同",value:1},{label:"中立",value:2},{label:"不认同",value:3}]},{id:"q27",dim:"So2",text:"有时候你明明对一件事有不同的、负面的看法，但最后没说出来。原因是：",options:[{label:"这种情况较少。",value:1},{label:"可能碍于情面或者关系。",value:2},{label:"不想让别人知道自己是个阴暗的人。",value:3}]},{id:"q28",dim:"So2",text:"我在不同人面前会表现出不一样的自己",options:[{label:"不认同",value:1},{label:"中立",value:2},{label:"认同",value:3}]},{id:"q29",dim:"So3",text:"你更愿意过怎样的生活？",options:[{label:"自由散漫，不被约束",value:1},{label:"有序但不失灵活",value:2},{label:"有目标、有节奏的生活",value:3}]}];

const DIM_META={S1:{name:"自尊自信",model:"自我模型"},S2:{name:"自我清晰度",model:"自我模型"},S3:{name:"核心价值",model:"自我模型"},E1:{name:"依恋安全感",model:"情感模型"},E2:{name:"情感投入度",model:"情感模型"},E3:{name:"边界与依赖",model:"情感模型"},A1:{name:"世界观倾向",model:"態度模型"},A2:{name:"规则与灵活度",model:"態度模型"},A3:{name:"人生意义感",model:"態度模型"},Ac1:{name:"动机导向",model:"行動驅力"},Ac2:{name:"决策风格",model:"行動驅力"},Ac3:{name:"执行模式",model:"行動驅力"},So1:{name:"社交主动性",model:"社交模型"},So2:{name:"人际边界感",model:"社交模型"},So3:{name:"表达与真实度",model:"社交模型"}};

const DIM_EXPLANATIONS={S1:{L:"对自己下手比别人还狠，夸你两句你都想先验明真伪。",M:"自信值随天气波动，顺风能飞，逆风先缩。",H:"心里对自己大致有数，不太会被路人一句话打散。"},S2:{L:"内心频道雪花较多，常在"我是谁"里循环缓存。",M:"平时还能认出自己，偶尔也会被情绪临时换号。",H:"对自己的脾气、欲望和底线都算门儿清。"},S3:{L:"更在意舒服和安全，没必要天天给人生开冲刺模式。",M:"想上进，也想躺会儿，价值排序经常内部开会。",H:"很容易被目标、成长或某种重要信念推着往前。"},E1:{L:"感情里警报器灵敏，已读不回都能脑补到大结局。",M:"一半信任，一半试探，感情里常在心里拉锯。",H:"更愿意相信关系本身，不会被一点风吹草动吓散。"},E2:{L:"感情投入偏克制，心门不是没开，是门禁太严。",M:"会投入，但会给自己留后手，不至于全盘梭哈。",H:"一旦认定就容易认真，情绪和精力都给得很足。"},E3:{L:"容易黏人也容易被黏，关系里的温度感很重要。",M:"亲密和独立都要一点，属于可调节型依赖。",H:"空间感很重要，再爱也得留一块属于自己的地。"},A1:{L:"看世界自带防御滤镜，先怀疑，再靠近。",M:"既不天真也不彻底阴谋论，观望是你的本能。",H:"更愿意相信人性和善意，遇事不急着把世界判死刑。"},A2:{L:"规则能绕就绕，舒服和自由往往排在前面。",M:"该守的时候守，该变通的时候也不死磕。",H:"秩序感较强，能按流程来就不爱即兴炸场。"},A3:{L:"意义感偏低，容易觉得很多事都像在走过场。",M:"偶尔有目标，偶尔也想摆烂，人生观处于半开机。",H:"做事更有方向，知道自己大概要往哪边走。"},Ac1:{L:"做事先考虑别翻车，避险系统比野心更先启动。",M:"有时想赢，有时只想别麻烦，动机比较混合。",H:"更容易被成果、成长和推进感点燃。"},Ac2:{L:"做决定前容易多转几圈，脑内会议常常超时。",M:"会想，但不至于想死机，属于正常犹豫。",H:"拍板速度快，决定一下就不爱回头磨叽。"},Ac3:{L:"执行力和死线有深厚感情，越晚越像要觉醒。",M:"能做，但状态看时机，偶尔稳偶尔摆。",H:"推进欲比较强，事情不落地心里都像卡了根刺。"},So1:{L:"社交启动慢热，主动出击这事通常得攒半天气。",M:"有人来就接，没人来也不硬凑，社交弹性一般。",H:"更愿意主动打开场子，在人群里不太怕露头。"},So2:{L:"关系里更想亲近和融合，熟了就容易把人划进内圈。",M:"既想亲近又想留缝，边界感看对象调节。",H:"边界感偏强，靠太近会先本能性后退半步。"},So3:{L:"表达更直接，心里有啥基本不爱绕。",M:"会看气氛说话，真实和体面通常各留一点。",H:"对不同场景的自我切换更熟练，真实感会分层发放。"}};

const TYPES=[{code:"CTRL",cn:"拿捏者",intro:"怎么样，被我拿捏了吧？",desc:"恭喜您，您测出了全中国最为罕见的人格，您是宇宙熵增定律的天然反抗者！CTRL人格，是行走的人形自走任务管理器。拥有CTRL朋友意味着你的人生导航系统会变得更加精准、高效。"},{code:"BOSS",cn:"领导者",intro:"BOSS是一个手里永远拿着方向盘的人。",desc:"效率是他们的信仰，秩序是他们的呼吸。他们眼中的"自我突破"，约等于普通人眼中的"自虐"。今天掌握一门新语言，明天考下一个专业证书，后天就计划殖民火星。"},{code:"THAN-K",cn:"感恩者",intro:"我感谢苍天！我感谢大地！",desc:"THAN-K拥有温润如玉的性格和海纳百川的胸怀。他们眼中的世界没有完全的坏人，只有"尚未被感恩光芒照耀到的朋友"。"},{code:"GOGO",cn:"行人",intro:"gogogo~出发咯",desc:"GOGO活在一个极致的"所见即所得"世界里，人生信条简单粗暴到令人发指。"},{code:"SEXY",cn:"尤物",intro:"您就是天生的尤物！",desc:"当您走进一个房间，照明系统会自动将您识别为尤物，并自觉调暗亮度。"},{code:"LOVE-R",cn:"多情者",intro:"爱意太满，现实显得有点贫瘠。",desc:"LOVE-R人格是远古神话时代幸存至今的珍稀物种，您的情感处理器不是二进制的，而是彩虹制的。"},{code:"MUM",cn:"妈妈",intro:"或许...我可以叫你妈妈吗....?",desc:"妈妈人格的底色是温柔，擅长感知情绪，具有超强共情力。"},{code:"FAKE",cn:"伪人",intro:"已经，没有人类了。",desc:"在社交场合，伪人是八面玲珑的存在，切换"人格面具"比切换输入法还快。"},{code:"OG8K",cn:"无所谓人",intro:"我说随便，是真的随便。",desc:"这已经不是一种人格，而是一种统治哲学！一种凌驾于世俗纷扰之上的、帝王般的慵懒与恩准！"},{code:"MALO",cn:"吗喽",intro:"人生是个副本，而我只是一只吗喽。",desc:"朋友，你不是"童心未泯"，你压根就没进化！你的灵魂还停留在那个挂在树上荡秋千的快乐时代！"},{code:"JOKE-R",cn:"小丑",intro:"原来我们都是小丑。",desc:"JOKE-R是社恐的外壳，社牛的灵魂。他们用笑闹的方式，处理所有无法直视的真相。"},{code:"WOC!",cn:"握草人",intro:"woc，我怎么是这个人格？",desc:"WOC!人拥有两种完全独立的操作系统：一个叫"表面系统"，另一个叫"后台系统"。"},{code:"THIN-K",cn:"思考者",intro:"已深度思考100s。",desc:"您的大脑时长处于思考状态，您十分会审判信息，注重论点、论据、逻辑推理。"},{code:"SHIT",cn:"愤世者",intro:"这个世界简直是shift。",desc:"群里99+条消息您可以视而不见，但当有人发出"@全体成员 还有半小时就截止了"，您会缓缓敲出一个"收到"。"},{code:"ZZZZ",cn:"装死者",intro:"我没死，我只是在睡觉。",desc:"您的精力管理策略就是"战略性休眠"。不是摆烂，是智慧。"},{code:"POOR",cn:"贫困者",intro:"我穷，但我很专。",desc:"您的精力压成一束激光，照哪儿，哪儿就开始冒烟。热闹、社交、虚荣？抱歉，没空。"},{code:"MONK",cn:"僧人",intro:"没有那种世俗的欲望。",desc:"孤儿的自我价值感偏低，因此有时主动疏远他人，在自己的灵魂外围，建起了一座名为"莫挨老子"的万里长城。"},{code:"SOLO",cn:"孤儿",intro:"我哭了，我怎么会是孤儿？",desc:"别急着哭，国王的加冕仪式，通常都是一个人。"},{code:"ATM-er",cn:"送钱者",intro:"你以为我很有钱吗？",desc:"您或将成为金融界的未解之谜——ATM-er不一定真的"送钱"，但可能永远在"支付"。"},{code:"Dior-s",cn:"雕丝",intro:"等着我逆袭。",desc:"Dior-s人格，是对当代消费主义陷阱和成功学PUA最彻底的蔑视。Dior-s早已看穿一切"上进"的尽头不过是更高级的牢房。"},{code:"OH-NO",cn:"哦不人",intro:"哦不！我怎么会是这个人格？！",desc:"哦不！"，并非恐惧的尖叫，而是一种顶级的智慧！当普通人看到一个杯子放在桌沿，哦不人看到的是一场灾难史诗。"},{code:"IMSB",cn:"傻者",intro:"认真的么？我真的是sb么？",desc:"您根本不在人类范畴内！您的脑子里住着两个究极战士：一个叫"我tm冲了！"，另一个叫"我是个sb！"。"},{code:"FU?K",cn:"草者",intro:"wtf?！这是什么人格？",desc:"您的内在具有极强的生命力！学名就叫"FU?K"！在FU?K的世界观里，世俗规则简直毫无意义。"},{code:"DEAD",cn:"死者",intro:"我，还活着吗？",desc:"死者已经看透了那些无意义的哲学思考，因此显得对一切"失去"了兴趣。"},{code:"IMFW",cn:"废物",intro:"我真的...是废物吗？",desc:"您为什么走路摇摇晃晃？因为您体内流淌的不是血液，是美味的五粮液！"},{code:"HHHH",cn:"傻乐者",intro:"哈哈哈哈哈哈。",desc:"这个人格有什么特质？哈哈哈哈哈哈哈哈哈哈哈哈！对不起，这就是全部的特质了。"}];

const CODE_TO_PATTERN={"CTRL":"HHH-HMH-MHH-HHH-MHM","ATM-er":"HHH-HHM-HHH-HMH-MHL","Dior-s":"MHM-MMH-MHM-HMH-LHL","BOSS":"HHH-HMH-MMH-HHH-LHL","THAN-K":"MHM-HMM-HHM-MMH-MHL","OH-NO":"HHL-LMH-LHH-HHM-LHL","GOGO":"HHM-HMH-MMH-HHH-MHM","SEXY":"HMH-HHL-HMM-HMM-HLH","LOVE-R":"MLH-LHL-HLH-MLM-MLH","MUM":"MMH-MHL-HMM-LMM-HLL","FAKE":"HLM-MML-MLM-MLM-HLH","OG8K":"MMH-MMM-HML-LMM-MML","MALO":"MLH-MHM-MLH-MLH-LMH","JOKE-R":"LLH-LHL-LML-LLL-MLM","WOC!":"HHL-HMH-MMH-HHM-LHH","THIN-K":"HHL-HMH-MLH-MHM-LHH","SHIT":"HHL-HLH-LMM-HHM-LHH","ZZZZ":"MHL-MLH-LML-MML-LHM","POOR":"HHL-MLH-LMH-HHH-LHL","MONK":"HHL-LLH-LLM-MML-LHM","IMSB":"LLM-LMM-LLL-LLL-MLM","SOLO":"LML-LLH-LHL-LML-LHM","FU?K":"MLL-LHL-LLM-MLL-HLH","DEAD":"LLL-LLM-LML-LLL-LHM","IMFW":"LLH-LHL-LML-LLL-MLL","HHHH":"LLL-LLM-LML-LLL-LHM"};

let currentQ=0,answers={};

function sumToLevel(s){return s<=3?"L":s===4?"M":"H";}
function lmhToNum(l){return{L:1,M:2,H:3}[l]||1;}

function computeResult(){
  const scores={},levels={};
  Object.keys(DIM_META).forEach(d=>scores[d]=0);
  QUESTIONS.forEach(q=>{if(answers[q.id])scores[q.dim]+=Number(answers[q.id]);});
  Object.entries(scores).forEach(([d,s])=>{levels[d]=sumToLevel(s);});
  const dimOrder=["S1","S2","S3","E1","E2","E3","A1","A2","A3","Ac1","Ac2","Ac3","So1","So2","So3"];
  const userVals=dimOrder.map(d=>lmhToNum(levels[d]));
  let best=null,bestDist=999;
  TYPES.forEach(t=>{
    const patStr=CODE_TO_PATTERN[t.code];
    if(!patStr)return;
    const pat=patStr.replace(/-/g,"").split("").map(c=>lmhToNum(c));
    let dist=0,exact=0;
    for(let i=0;i<15;i++){
      dist+=Math.abs(userVals[i]-pat[i]);
      if(userVals[i]===pat[i])exact++;
    }
    const sim=Math.max(0,Math.round(100*(1-dist/30)));
    if(dist<bestDist||(dist===bestDist&&exact>(best?.exact||0))){
      bestDist=dist;best={...t,dist,exact,sim};
    }
  });
  let final=best,kicker="你的主类型",badge=`匹配度 ${best.sim}% · 精准命中 ${best.exact}/15 维`;
  if(best.sim<60){
    final=TYPES.find(t=>t.code==="HHHH")||TYPES[TYPES.length-1];
    kicker="系统强制兜底";
    badge=`标准人格库最高匹配仅 ${best.sim}%`;
  }
  return{scores,levels,best,final,kicker,badge};
}

function startTest(){
  currentQ=0;answers={};
  document.getElementById('intro-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('test-screen').style.display='block';
  renderQuestion();
}

function renderQuestion(){
  const q=QUESTIONS[currentQ];
  document.getElementById('progress-fill').style.width=((currentQ+1)/QUESTIONS.length*100)+'%';
  document.getElementById('progress-text').textContent=`${currentQ+1} / ${QUESTIONS.length}`;
  const area=document.getElementById('question-area');
  area.innerHTML=`<div class="question-card"><div class="question-text">${q.text}</div><div class="options">${q.options.map(o=>`<div class="option${answers[q.id]===o.value?' selected':''}" onclick="selectOption('${q.id}',${o.value})">${o.label}</div>`).join('')}</div></div>`;
  document.getElementById('prev-btn').disabled=currentQ===0;
  document.getElementById('next-btn').disabled=!answers[q.id];
  document.getElementById('next-btn').textContent=currentQ===QUESTIONS.length-1?'查看結果 →':'下一題 →';
}

function selectOption(id,val){
  answers[id]=val;
  renderQuestion();
}

function nextQuestion(){
  if(currentQ<QUESTIONS.length-1){
    currentQ++;renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion(){
  if(currentQ>0){currentQ--;renderQuestion();}
}

function showResult(){
  const r=computeResult();
  document.getElementById('test-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  document.getElementById('result-badge').textContent=r.kicker;
  document.getElementById('result-type').textContent=r.final.code;
  document.getElementById('result-name').textContent=r.final.cn;
  document.getElementById('result-intro').textContent=r.final.intro;
  document.getElementById('result-match').innerHTML=`匹配度 <strong>${r.best.sim}%</strong> · 精准命中 <strong>${r.best.exact}/15</strong> 维`;
  document.getElementById('result-desc').textContent=r.final.desc;
  
  const dimOrder=["S1","S2","S3","E1","E2","E3","A1","A2","A3","Ac1","Ac2","Ac3","So1","So2","So3"];
  document.getElementById('dim-grid').innerHTML=dimOrder.map(d=>`<div class="dim-card"><div class="dim-name">${DIM_META[d].name}</div><div class="dim-desc">${DIM_EXPLANATIONS[d][r.levels[d]]}</div><span class="dim-level ${r.levels[d]}">${r.levels[d]}</span></div>`).join('');
}

function restartTest(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('intro-screen').style.display='block';
}
</script>
